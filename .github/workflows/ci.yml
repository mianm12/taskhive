name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  GO_VERSION: stable
  GOLANGCI_LINT_VERSION: latest

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
